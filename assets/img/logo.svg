<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spatial Data Archival logo">
  <defs>
    <linearGradient id="lgAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="lgGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="lgTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- Cold tier (bottom) -->
    <path d="M32 40 L52 46 L32 52 L12 46 Z" fill="url(#lgTeal)" stroke="#0b5d57" stroke-width="0.8"/>
    <!-- Warm tier (middle) -->
    <path d="M32 25 L52 31 L32 37 L12 31 Z" fill="url(#lgGreen)" stroke="#0a8f6c" stroke-width="0.8"/>
    <!-- Hot tier (top) -->
    <path d="M32 10 L52 16 L32 22 L12 16 Z" fill="url(#lgAmber)" stroke="#d97706" stroke-width="0.8"/>
    <!-- Spatial scan highlight on the hot tier -->
    <path d="M22 16 L32 19 L42 16" fill="none" stroke="#fffbeb" stroke-width="1.1" opacity="0.85"/>
  </g>
</svg>
